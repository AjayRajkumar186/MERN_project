version: '3.8'

services:
  mongodb: 
    image: mongo:latest
    container_name: mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db # ✅ Keeps your data safe on your hard drive

  backend:
    build: ./backend
    container_name: backend_container
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/myDatabase
      - PORT=5000
      - JWT_SECRET=59f12c5b78431f68346d72f4188e38260510905eaff2e12c9f3dd00d4fffd8768
      - RAZORPAY_KEY=rzp_test_STqHb1ZKajDEzK
      - RAZORPAY_SECRET=vFHfytyloYnG8IRYOfga6rn1
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: frontend_container
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://api.shopmate.test # Updated to use the custom backend domain
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

# ✅ Define the volume used by mongodb
volumes:
  mongo_data: